version: 0.1

projects:
  - path: aws/dns
    name: kkpp-dns
  - path: aws/edge-security
    name: kkpp-edge-security
  - path: aws/web-edge
    name: kkpp-web-edge
    terraform_vars:
      aliases:
        - example.com
        - www.example.com
      acm_certificate_arn: arn:aws:acm:us-east-1:000000000000:certificate/00000000-0000-0000-0000-000000000000
      web_acl_arn: arn:aws:wafv2:us-east-1:000000000000:global/webacl/example-web-edge-cloudfront/00000000-0000-0000-0000-000000000000
  - path: aws/eks
    name: kkpp-eks
    terraform_vars:
      region: ap-northeast-2
      cluster_name: kkpp-eks
      vpc_id: vpc-00000000000000000
      private_subnet_ids:
        - subnet-00000000000000000
        - subnet-11111111111111111
      public_subnet_ids:
        - subnet-22222222222222222
        - subnet-33333333333333333
      node_instance_types:
        - t3.medium
      desired_size: 2
      min_size: 1
      max_size: 3
  - path: aws/networking
    name: kkpp-networking
    terraform_vars:
      region: ap-northeast-2
      vpc_cidr: 10.0.0.0/20
  - path: aws/data
    name: kkpp-data
