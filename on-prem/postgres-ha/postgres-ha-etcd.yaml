apiVersion: v1
kind: Namespace
metadata:
  name: postgres-ha
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: patroni-etcd
  namespace: postgres-ha
  labels:
    app: patroni-etcd
spec:
  serviceName: patroni-etcd
  replicas: 1
  selector:
    matchLabels:
      app: patroni-etcd
  template:
    metadata:
      labels:
        app: patroni-etcd
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai-node
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.18
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/etcd
          args:
            - --name=patroni-etcd-0
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://192.0.2.22:32379
            - --listen-peer-urls=http://127.0.0.1:2380
            - --initial-advertise-peer-urls=http://127.0.0.1:2380
            - --initial-cluster=patroni-etcd-0=http://127.0.0.1:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=patroni-etcd
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
      volumes:
        - name: data
          hostPath:
            path: /var/lib/patroni-etcd
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: patroni-etcd
  namespace: postgres-ha
  labels:
    app: patroni-etcd
spec:
  type: NodePort
  selector:
    app: patroni-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
      nodePort: 32379
