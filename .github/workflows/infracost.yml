name: infracost

on:
  workflow_dispatch:

jobs:
  infracost:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost estimate
        run: infracost breakdown --config-file=infracost.yml --usage-file=infracost-usage.yml --format=json --out-file=/tmp/infracost.json
